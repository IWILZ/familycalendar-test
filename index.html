<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FamilyCalendar Test</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2563eb" />
<link rel="icon" href="icon-192.png" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Roboto, Arial, sans-serif;
    background: #0f172a; color: #f1f5f9; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 40px;
  }
  h1 { font-size: 20px; margin: 8px 0 4px; text-align: center; }
  p.sub { color: #94a3b8; font-size: 14px; margin: 0 0 20px; text-align: center; }
  #video-wrap {
    position: relative; width: 100%; max-width: 420px; aspect-ratio: 1/1;
    border-radius: 16px; overflow: hidden; background: #000;
    border: 2px solid #2563eb;
  }
  video { width: 100%; height: 100%; object-fit: cover; }
  #status {
    margin-top: 18px; padding: 12px 16px; border-radius: 10px;
    background: #1e293b; width: 100%; max-width: 420px; text-align: center;
    font-size: 15px; min-height: 22px; word-break: break-word;
  }
  #status.ok { background: #14532d; }
  #status.err { background: #7f1d1d; }
  a.openlink {
    display: inline-block; margin-top: 14px; padding: 12px 22px;
    background: #2563eb; color: white; text-decoration: none;
    border-radius: 10px; font-weight: 600;
  }
  #btn-camera {
    margin-top: 16px; padding: 10px 18px; border-radius: 10px; border: none;
    background: #334155; color: #f1f5f9; font-size: 14px;
  }
</style>
</head>
<body>
  <h1>📅 FamilyCalendar — Test scanner</h1>
  <p class="sub">Inquadra il QR mostrato dal PC o da un altro telefono</p>

  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>
  </div>

  <div id="status">In attesa della fotocamera…</div>
  <button id="btn-camera">Riavvia fotocamera</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script src="jsQR.js"></script>
  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const statusEl = document.getElementById("status");
    let scanning = true;
    let stream = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || "";
    }

    async function startCamera() {
      scanning = true;
      setStatus("In attesa della fotocamera…");
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        await video.play();
        setStatus("Fotocamera attiva — inquadra il QR");
        requestAnimationFrame(tick);
      } catch (err) {
        setStatus("Errore fotocamera: " + err.message, "err");
      }
    }

    function tick() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          onQrDetected(code.data);
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    function onQrDetected(text) {
      scanning = false;
      if (stream) stream.getTracks().forEach((t) => t.stop());

      const isOpenable = /^(https?:|intent:)/i.test(text);
      if (isOpenable) {
        setStatus("QR riconosciuto, apertura in corso…", "ok");
        const a = document.createElement("a");
        a.className = "openlink";
        a.href = text;
        a.textContent = "Apri manualmente se non si apre da solo";
        statusEl.after(a);
        setTimeout(() => { window.location.href = text; }, 700);
      } else {
        setStatus("QR letto ma non è un link valido: " + text, "err");
      }
    }

    document.getElementById("btn-camera").addEventListener("click", startCamera);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }

    startCamera();
  </script>
</body>
</html>
